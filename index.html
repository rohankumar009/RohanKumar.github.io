<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Under Maintenance</title>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: #f5f5f5;
      font-family: Arial, sans-serif;
    }

    .maintenance-message {
      text-align: center;
      padding: 20px;
      border: 2px solid #333;
      border-radius: 10px;
      background-color: #fff;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      min-width: 300px;
    }

    .countdown-label {
      font-size: 0.95rem;
      color: #666;
      margin-bottom: 6px;
    }

    .countdown {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 14px;
      color: #111;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="maintenance-message">
    <div class="countdown-label">Time Remaining</div>
    <div class="countdown" id="countdown">06:00:00</div>
    <h1>Under Maintenance</h1>
    <p>Will be back soon! 👨‍💻</p>
    <p>Monday Feb 23rd 🤩</p>
  </div>

  <script>
    const countdownEl = document.getElementById("countdown");
    const STORAGE_KEY = "maintenanceCountdownEndTime";
    const SIX_HOURS_MS = 6 * 60 * 60 * 1000;

    function getOrCreateEndTime() {
      const saved = localStorage.getItem(STORAGE_KEY);
      const now = Date.now();

      if (saved && !Number.isNaN(Number(saved))) {
        return Number(saved);
      }

      const endTime = now + SIX_HOURS_MS;
      localStorage.setItem(STORAGE_KEY, String(endTime));
      return endTime;
    }

    let endTime = getOrCreateEndTime();

    function formatTime(msLeft) {
      const totalSeconds = Math.max(0, Math.floor(msLeft / 1000));
      const hours = String(Math.floor(totalSeconds / 3600)).padStart(2, "0");
      const minutes = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, "0");
      const seconds = String(totalSeconds % 60).padStart(2, "0");
      return `${hours}:${minutes}:${seconds}`;
    }

    function updateCountdown() {
      const now = Date.now();
      const msLeft = endTime - now;

      countdownEl.textContent = formatTime(msLeft);

      if (msLeft <= 0) {
        clearInterval(timer);
        countdownEl.textContent = "00:00:00";
      }
    }

    updateCountdown();
    const timer = setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
